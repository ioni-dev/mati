# Per-repo cargo config for mati.
#
# Why RUST_TEST_THREADS=4:
#   Each tokio test in `mcp/tools.rs` (59 tests) and `mcp/server.rs` (18 tests)
#   opens its own SurrealKV instance via `Store::open(tempdir)`. SurrealKV
#   cold-open + fsync does not scale linearly with parallelism, and on macOS
#   14 simultaneous instances (default = num_cpus on M-series) can saturate
#   APFS + the `logd` firehose dispatch queue. When `logd` misses its kernel
#   watchdog check-in window (~120s), macOS panics the kernel.
#
#   4 is the empirically-safe ceiling on Apple Silicon and still gives good
#   wall-time on Linux CI. Override per-invocation with
#   `RUST_TEST_THREADS=N cargo test` when you need more.
#
#   `force = false` means an explicit env override wins.
[env]
RUST_TEST_THREADS = { value = "4", force = false }
